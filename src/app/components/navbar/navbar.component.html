<nav
  class="fixed top-0 w-full z-50 glass-panel border-b-0 rounded-none px-6 py-4 flex justify-between items-center transition-all duration-300"
>
  <div class="flex items-center gap-2 cursor-pointer" routerLink="/">
    <div
      class="w-8 h-8 rounded bg-gradient-to-br from-cyber-cyan to-neon-purple shadow-glow-cyan"
    ></div>
    <span
      class="font-mono font-bold text-xl tracking-wider text-gray-900 dark:text-white transition-colors duration-300"
      >SYS.ARCHITECT</span
    >
  </div>

  <!-- Desktop Nav -->
  <div class="hidden md:flex gap-8 items-center">
    <a
      routerLink="/"
      routerLinkActive="!text-cyber-cyan"
      class="text-sm uppercase tracking-widest text-gray-700 dark:text-gray-300 hover:text-cyber-cyan dark:hover:text-cyber-cyan transition-colors"
      >Home</a
    >
    <a
      routerLink="/about"
      routerLinkActive="!text-cyber-cyan"
      class="text-sm uppercase tracking-widest text-gray-700 dark:text-gray-300 hover:text-cyber-cyan dark:hover:text-cyber-cyan transition-colors"
      >About</a
    >
    <a
      routerLink="/services"
      routerLinkActive="!text-neon-purple"
      class="text-sm uppercase tracking-widest text-gray-700 dark:text-gray-300 hover:text-neon-purple dark:hover:text-neon-purple transition-colors"
      >Services</a
    >
    <a
      routerLink="/case-studies"
      routerLinkActive="!text-cyber-cyan"
      class="text-sm uppercase tracking-widest text-gray-700 dark:text-gray-300 hover:text-cyber-cyan dark:hover:text-cyber-cyan transition-colors"
      >Case Studies</a
    >
    <a
      routerLink="/contact"
      mat-stroked-button
      color="primary"
      class="!border-cyber-cyan !text-cyber-cyan hover:!bg-cyber-cyan/10"
    >
      Contact
    </a>

    <!-- Theme Toggle -->
    <button
      mat-icon-button
      (click)="toggleTheme()"
      class="text-gray-700 dark:text-gray-300 ml-4 transition-colors duration-300"
    >
      <mat-icon>{{ isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
  </div>

  <!-- Mobile Controls -->
  <div class="flex items-center md:hidden gap-2">
    <!-- Theme Toggle Mobile -->
    <button
      mat-icon-button
      (click)="toggleTheme()"
      class="text-gray-700 dark:text-gray-300 transition-colors duration-300"
    >
      <mat-icon>{{ isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <!-- Menu Toggle -->
    <button mat-icon-button class="!text-cyber-cyan" (click)="toggleMenu()">
      <mat-icon>{{ isMenuOpen() ? 'close' : 'menu' }}</mat-icon>
    </button>
  </div>

  <!-- Mobile Menu Dropdown -->
  @if (isMenuOpen()) {
    <div
      class="absolute top-full left-0 w-full glass-panel border-t border-glass-border rounded-none flex flex-col p-6 gap-4 md:hidden shadow-lg animate-in fade-in slide-in-from-top-4 z-50"
    >
      <a
        routerLink="/about"
        routerLinkActive="!text-cyber-cyan"
        class="py-2 text-lg text-gray-700 dark:text-gray-300 hover:text-cyber-cyan transition-colors"
        (click)="toggleMenu()"
        >About</a
      >
      <a
        routerLink="/services"
        routerLinkActive="!text-neon-purple"
        class="py-2 text-lg text-gray-700 dark:text-gray-300 hover:text-neon-purple transition-colors"
        (click)="toggleMenu()"
        >Services</a
      >
      <a
        routerLink="/case-studies"
        routerLinkActive="!text-cyber-cyan"
        class="py-2 text-lg text-gray-700 dark:text-gray-300 hover:text-cyber-cyan transition-colors"
        (click)="toggleMenu()"
        >Case Studies</a
      >
      <a
        routerLink="/contact"
        mat-flat-button
        color="primary"
        class="!bg-cyber-cyan !text-dark-bg mt-4"
        (click)="toggleMenu()"
      >
        Contact
      </a>
    </div>
  }
</nav>
