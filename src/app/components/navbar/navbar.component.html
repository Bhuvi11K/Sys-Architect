<nav
  class="fixed top-0 w-full z-50 glass-panel border-b border-glass-border rounded-none px-6 py-4 flex justify-between items-center transition-all duration-300"
>
  <!-- Logo -->
  <div class="flex items-center gap-2 cursor-pointer" routerLink="/">
    <div
      class="w-8 h-8 rounded bg-gradient-to-br from-cyber-cyan to-neon-purple shadow-glow-cyan"
    ></div>

    <div class="flex flex-col leading-tight">
      <span class="font-mono font-bold text-lg text-white"> SYS.ARCHITECT </span>
      <span class="text-[10px] text-gray-400 uppercase tracking-widest">
        Full Stack Developer
      </span>
    </div>
  </div>

  <!-- Desktop Nav -->
  <div class="hidden md:flex gap-8 items-center">
    <a
      routerLink="/"
      routerLinkActive="!text-cyber-cyan"
      [routerLinkActiveOptions]="{ exact: true }"
      class="text-sm uppercase tracking-widest text-gray-300 hover:text-cyber-cyan transition-colors"
    >
      Home
    </a>

    <a
      routerLink="/about"
      routerLinkActive="!text-cyber-cyan"
      class="text-sm uppercase tracking-widest text-gray-300 hover:text-cyber-cyan transition-colors"
    >
      About
    </a>

    <a
      routerLink="/services"
      routerLinkActive="!text-neon-purple"
      class="text-sm uppercase tracking-widest text-gray-300 hover:text-neon-purple transition-colors"
    >
      Services
    </a>

    <a
      routerLink="/case-studies"
      routerLinkActive="!text-cyber-cyan"
      class="text-sm uppercase tracking-widest text-gray-300 hover:text-cyber-cyan transition-colors"
    >
      Work
    </a>

    <!-- Primary CTA (BIG CHANGE) -->
    <a
      routerLink="/contact"
      mat-flat-button
      class="!bg-cyber-cyan !text-dark-bg !px-6 !py-3 !text-sm hover:shadow-glow-cyan transition-all"
    >
      Hire Me
    </a>

    <!-- Secondary CTA (Optional - WhatsApp) -->
    <!-- <a
      href="https://wa.me/your-number"
      target="_blank"
      class="text-sm text-matrix-green hover:underline"
    >
      <mat-icon>chat</mat-icon>
    </a> -->

    <!-- Theme Toggle -->
    <!-- <button
      mat-icon-button
      (click)="toggleTheme()"
      class="text-gray-300 ml-2 transition-colors duration-300"
    >
      <mat-icon>{{ isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button> -->
  </div>

  <!-- Mobile Controls -->
  <div class="flex items-center md:hidden gap-2">
    <!-- Theme Toggle -->
    <button
      mat-icon-button
      (click)="toggleTheme()"
      class="text-gray-300 transition-colors duration-300"
    >
      <mat-icon>{{ isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <!-- Menu Toggle -->
    <button mat-icon-button class="!text-cyber-cyan" (click)="toggleMenu()">
      <mat-icon>{{ isMenuOpen() ? 'close' : 'menu' }}</mat-icon>
    </button>
  </div>

  <!-- Mobile Menu -->
  @if (isMenuOpen()) {
    <div
      class="absolute top-full left-0 w-full glass-panel border-t border-glass-border flex flex-col p-6 gap-4 md:hidden shadow-lg animate-in fade-in slide-in-from-top-4 z-50"
    >
      <a
        routerLink="/"
        class="py-2 text-lg text-gray-300 hover:text-cyber-cyan"
        (click)="toggleMenu()"
      >
        Home
      </a>

      <a
        routerLink="/about"
        class="py-2 text-lg text-gray-300 hover:text-cyber-cyan"
        (click)="toggleMenu()"
      >
        About
      </a>

      <a
        routerLink="/services"
        class="py-2 text-lg text-gray-300 hover:text-neon-purple"
        (click)="toggleMenu()"
      >
        Services
      </a>

      <a
        routerLink="/case-studies"
        class="py-2 text-lg text-gray-300 hover:text-cyber-cyan"
        (click)="toggleMenu()"
      >
        Work
      </a>

      <!-- Primary CTA -->
      <a
        routerLink="/contact"
        mat-flat-button
        class="!bg-cyber-cyan !text-dark-bg mt-4"
        (click)="toggleMenu()"
      >
        Hire Me
      </a>

      <!-- WhatsApp CTA -->
      <a
        href="https://wa.me/your-number"
        target="_blank"
        class="text-center text-matrix-green mt-2 underline"
      >
        Chat on WhatsApp
      </a>
    </div>
  }
</nav>
